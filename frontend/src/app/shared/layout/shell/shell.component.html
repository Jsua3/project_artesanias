<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="brand">
      <mat-icon>inventory_2</mat-icon>
      <span>Almacén Arle</span>
    </div>
    <mat-divider />

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/products" routerLinkActive="active-link">
        <mat-icon matListItemIcon>inventory</mat-icon>
        <span matListItemTitle>Productos</span>
      </a>
      <a mat-list-item routerLink="/categories" routerLinkActive="active-link">
        <mat-icon matListItemIcon>category</mat-icon>
        <span matListItemTitle>Categorías</span>
      </a>
      <a mat-list-item routerLink="/stock" routerLinkActive="active-link">
        <mat-icon matListItemIcon>warehouse</mat-icon>
        <span matListItemTitle>Stock</span>
      </a>
      <a mat-list-item routerLink="/inventory/entries" routerLinkActive="active-link">
        <mat-icon matListItemIcon>add_circle</mat-icon>
        <span matListItemTitle>Entradas</span>
      </a>
      <a mat-list-item routerLink="/inventory/exits" routerLinkActive="active-link">
        <mat-icon matListItemIcon>remove_circle</mat-icon>
        <span matListItemTitle>Salidas</span>
      </a>
      @if (auth.isAdmin()) {
        <mat-divider />
        <a mat-list-item routerLink="/reports" routerLinkActive="active-link">
          <mat-icon matListItemIcon>bar_chart</mat-icon>
          <span matListItemTitle>Reportes</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">
      <mat-divider />
      <div class="user-info">
        <mat-icon>person</mat-icon>
        <div>
          <p class="username">{{ auth.currentUser()?.username }}</p>
          <p class="role">{{ auth.currentUser()?.role }}</p>
        </div>
      </div>
      <button mat-button color="warn" (click)="auth.logout()">
        <mat-icon>logout</mat-icon> Salir
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
