<div class="page-container">
  <h2 class="page-title">Dashboard</h2>

  @if (loading()) {
    <div class="loading-center">
      <mat-spinner />
    </div>
  } @else {
    <div class="stats-grid">
      <mat-card class="stat-card">
        <mat-icon class="stat-icon blue">inventory</mat-icon>
        <div>
          <p class="stat-value">{{ stats().products }}</p>
          <p class="stat-label">Productos</p>
        </div>
      </mat-card>

      <mat-card class="stat-card">
        <mat-icon class="stat-icon purple">category</mat-icon>
        <div>
          <p class="stat-value">{{ stats().categories }}</p>
          <p class="stat-label">Categorías</p>
        </div>
      </mat-card>

      <mat-card class="stat-card">
        <mat-icon class="stat-icon green">warehouse</mat-icon>
        <div>
          <p class="stat-value">{{ stats().stockItems }}</p>
          <p class="stat-label">Productos en Stock</p>
        </div>
      </mat-card>

      @if (auth.isAdmin()) {
        <mat-card class="stat-card">
          <mat-icon class="stat-icon red">warning</mat-icon>
          <div>
            <p class="stat-value">{{ stats().lowStock }}</p>
            <p class="stat-label">Stock Bajo (≤5)</p>
          </div>
        </mat-card>
      }
    </div>

    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Top 10 Productos por Stock</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <canvas baseChart
                [data]="barChartData()"
                [options]="barChartOptions"
                type="bar">
        </canvas>
      </mat-card-content>
    </mat-card>
  }
</div>
