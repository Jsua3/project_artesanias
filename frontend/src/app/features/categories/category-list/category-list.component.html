<div class="page-container">
  <div class="page-header">
    <h2 class="page-title">Categorías</h2>
    @if (auth.isAdmin()) {
      <button mat-raised-button color="primary" (click)="openForm()">
        <mat-icon>add</mat-icon> Nueva Categoría
      </button>
    }
  </div>

  @if (loading()) {
    <div class="loading-center"><mat-spinner /></div>
  } @else {
    <mat-card>
      <table mat-table [dataSource]="categories()" class="full-width">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let c">{{ c.name }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let c">
            @if (auth.isAdmin()) {
              <button mat-icon-button color="primary" (click)="openForm(c)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="delete(c.id)">
                <mat-icon>delete</mat-icon>
              </button>
            }
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      @if (categories().length === 0) {
        <p class="empty-msg">No hay categorías registradas.</p>
      }
    </mat-card>
  }
</div>
