<div class="page-container">
  <h2 class="page-title">Stock Actual</h2>

  @if (loading()) {
    <div class="loading-center"><mat-spinner /></div>
  } @else {
    <mat-card>
      <table mat-table [dataSource]="stock" class="full-width">
        <ng-container matColumnDef="productId">
          <th mat-header-cell *matHeaderCellDef>Producto ID</th>
          <td mat-cell *matCellDef="let s"><code>{{ s.productId }}</code></td>
        </ng-container>

        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef>Cantidad</th>
          <td mat-cell *matCellDef="let s">
            <strong>{{ s.quantity }}</strong>
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let s">
            <mat-chip [color]="getStatus(s.quantity).color" highlighted>
              {{ getStatus(s.quantity).label }}
            </mat-chip>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"
            [class.low-stock]="row.quantity <= 5"></tr>
      </table>
      @if (stock.length === 0) {
        <p class="empty-msg">No hay datos de stock disponibles.</p>
      }
    </mat-card>
  }
</div>
