server:
  port: 8082

spring:
  application:
    name: catalog-service
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:5432/catalog_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

security:
  jwt:
    internal-token: ${INTERNAL_TOKEN:my-super-secret-internal-token}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
