server:
  port: 8083

spring:
  application:
    name: inventory-service
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:5432/inventory_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:${KAFKA_HOST:localhost}:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    properties:
      security:
        protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl:
        mechanism: ${KAFKA_SASL_MECHANISM:}
        jaas:
          config: ${KAFKA_SASL_JAAS_CONFIG:}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

security:
  jwt:
    internal-token: ${INTERNAL_TOKEN:my-super-secret-internal-token}

catalog:
  service:
    url: ${CATALOG_SERVICE_URL:http://catalog-service:8082}

# Stripe (Fase 2b). Dejalo vacio en dev local para que los endpoints
# respondan 503 en lugar de intentar contactar Stripe.
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost/mis-pedidos/{ventaId}?paid=1}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost/checkout?canceled=1}
  currency: ${STRIPE_CURRENCY:cop}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
