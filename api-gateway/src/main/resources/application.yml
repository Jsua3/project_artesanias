server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://127.0.0.1:4200"
              - "http://localhost:4200"
              - "http://localhost"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Authorization
            allowCredentials: true
      routes:
        # Rutas públicas Auth
        - id: auth-service-public
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/login, /api/auth/register, /api/auth/register-cliente, /api/auth/refresh, /api/auth/google, /api/auth/config

        # Rutas privadas Auth
        - id: auth-service-private
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/me, /api/auth/me/profile-status, /api/auth/users, /api/auth/profile, /api/auth/artisan-requests, /api/auth/artisan-requests/**, /api/auth/approval-requests, /api/auth/approval-requests/**
          filters:
            - JwtAuth

        # Eventos públicos — sin JWT
        - id: catalog-service-public-eventos
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/public/eventos
          filters:
            - AddRequestHeader=X-Internal-Token, ${security.jwt.internal-token}

        # Admin DB — solo ADMIN
        - id: catalog-service-admin-db
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/admin/db/artesanos, /api/admin/db/products, /api/admin/db/posts, /api/admin/db/eventos
          filters:
            - JwtAuth

        - id: auth-service-admin-db
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/admin/db/users
          filters:
            - JwtAuth

        - id: inventory-service-admin-db
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/admin/db/clientes, /api/admin/db/ventas, /api/admin/db/pedidos
          filters:
            - JwtAuth

        # Catálogo público (GET) — accesible sin login para la tienda pública.
        # Excluye GET /api/artesanos/by-user/** (privacy: solo lo usa inventory
        # via call directo, no debe salir por la ruta pública).
        - id: catalog-service-management
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/products/admin/**, /api/artesanos/admin/**
          filters:
            - JwtAuth

        - id: catalog-service-community
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/comunidad/**
          filters:
            - JwtAuth

        - id: catalog-service-public
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/categories, /api/categories/**, /api/products, /api/products/**, /api/artesanos, /api/artesanos/**
            - Method=GET
          filters:
            # catalog-service tiene un InternalGatewayFilter que exige este header
            - AddRequestHeader=X-Internal-Token, ${security.jwt.internal-token}

        # Catálogo privado (POST/PUT/DELETE) — sólo ADMIN
        - id: catalog-service-private
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/categories, /api/categories/**, /api/products, /api/products/**, /api/artesanos, /api/artesanos/**
          filters:
            - JwtAuth

        # Inventory Service (stock, entradas, salidas, clientes, ventas admin, maestro-ventas)
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/stock/**, /api/entries/**, /api/exits/**, /api/clientes, /api/clientes/**, /api/ventas, /api/ventas/**, /api/cliente-ventas, /api/cliente-ventas/**, /api/maestro-ventas, /api/maestro-ventas/**
          filters:
            - JwtAuth

        # Stripe Webhook (público — la autenticidad la da la firma HMAC del body)
        # No lleva JwtAuth. Se inyecta X-Internal-Token para pasar el InternalGatewayFilter
        # del inventory-service. NO modificamos el body para no romper la firma.
        - id: inventory-service-stripe-webhook
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/stripe/**
            - Method=POST
          filters:
            - AddRequestHeader=X-Internal-Token, ${security.jwt.internal-token}

        # Report Service
        - id: report-service
          uri: ${REPORT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/reports/**
          filters:
            - JwtAuth

        # AI Service (diseÃ±ador 3D personalizado) â€” protegido por JWT.
        # El ai-service valida que solo CLIENTE/ADMIN puedan usarlo.
        - id: ai-service
          uri: ${AI_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/ai/**
          filters:
            - JwtAuth

security:
  jwt:
    secret: ${JWT_SECRET}
    internal-token: ${INTERNAL_TOKEN}

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
