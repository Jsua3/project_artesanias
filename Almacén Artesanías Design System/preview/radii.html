<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px;background:var(--cream);box-sizing:border-box;display:flex;gap:16px;align-items:flex-end}
  .pill{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1}
  .box{width:100%;aspect-ratio:1.4;background:var(--warm-white);border:1px solid var(--border-soft);display:flex;align-items:center;justify-content:center}
  .label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.5px}
  .px{font-family:'Outfit',sans-serif;font-size:10px;color:var(--fg-2);font-weight:500}
  .dot{width:18px;height:18px;background:var(--clay);opacity:.8}
</style></head>
<body>
  <div class="pill"><div class="box" style="border-radius:4px"><div class="dot" style="border-radius:3px"></div></div><div class="label">xs</div><div class="px">4 px</div></div>
  <div class="pill"><div class="box" style="border-radius:6px"><div class="dot" style="border-radius:4px"></div></div><div class="label">sm</div><div class="px">6 px</div></div>
  <div class="pill"><div class="box" style="border-radius:8px"><div class="dot" style="border-radius:6px"></div></div><div class="label">md</div><div class="px">8 px</div></div>
  <div class="pill"><div class="box" style="border-radius:12px"><div class="dot" style="border-radius:8px"></div></div><div class="label">lg</div><div class="px">12 px</div></div>
  <div class="pill"><div class="box" style="border-radius:16px"><div class="dot" style="border-radius:10px"></div></div><div class="label">xl</div><div class="px">16 px</div></div>
  <div class="pill"><div class="box" style="border-radius:20px"><div class="dot" style="border-radius:14px"></div></div><div class="label">2xl</div><div class="px">20 px</div></div>
  <div class="pill"><div class="box" style="border-radius:999px"><div class="dot" style="border-radius:999px"></div></div><div class="label">pill</div><div class="px">999</div></div>
</body></html>
