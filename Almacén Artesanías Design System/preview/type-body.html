<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 28px;background:var(--cream);box-sizing:border-box}
  .row{display:flex;align-items:baseline;gap:18px;padding:7px 0;border-bottom:1px solid var(--border-soft)}
  .row:last-child{border:none}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);min-width:100px;letter-spacing:.5px;text-transform:uppercase}
  .sample{font-family:'Outfit',sans-serif;color:var(--coffee)}
</style></head>
<body>
  <div class="row"><div class="meta">Outfit · 500 · 16</div><div class="sample" style="font-size:16px;font-weight:500">Pasa al taller</div></div>
  <div class="row"><div class="meta">Outfit · 300 · 16</div><div class="sample" style="font-size:16px;font-weight:300;line-height:1.65">Cada pieza cuenta la historia de una vereda y de un oficio que se pasa de mano en mano.</div></div>
  <div class="row"><div class="meta">Outfit · 400 · 13</div><div class="sample" style="font-size:13px;font-weight:400;color:var(--fg-2)">Doña Rosa Elvira · Pijao</div></div>
  <div class="row"><div class="meta">Outfit · 500 · 11</div><div class="sample" style="font-size:11px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:var(--moss)">Quiénes somos</div></div>
</body></html>
