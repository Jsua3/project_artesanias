<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 28px;background:var(--cream);box-sizing:border-box;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;align-items:center;gap:18px;padding:8px 0;border-bottom:1px solid var(--border-soft)}
  .row:last-child{border:none}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);min-width:110px;letter-spacing:.5px;text-transform:uppercase}
  .price{font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--clay-deep)}
  .ticket{font-family:'JetBrains Mono',monospace;color:var(--fg-2);background:var(--gold-12);padding:3px 8px;border-radius:4px;font-size:12px}
</style></head>
<body>
  <div class="row"><div class="meta">Mono · 500 · 22</div><div class="price" style="font-size:22px">$ 180.000 COP</div></div>
  <div class="row"><div class="meta">Mono · 500 · 15</div><div class="price" style="font-size:15px">$ 42.500</div></div>
  <div class="row"><div class="meta">Mono · 400 · 12</div><div class="ticket">SKU-TLR-0412</div></div>
</body></html>
