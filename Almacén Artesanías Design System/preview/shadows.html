<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 26px;background:var(--cream);box-sizing:border-box;display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
  .item{display:flex;flex-direction:column;gap:10px;align-items:center}
  .card{width:100%;aspect-ratio:1.3;background:var(--warm-white);border:1px solid var(--border-soft);border-radius:10px}
  .xs{box-shadow:0 1px 2px -1px rgba(62,39,35,0.10)}
  .sm{box-shadow:0 2px 8px -2px rgba(62,39,35,0.12)}
  .md{box-shadow:0 8px 20px -10px rgba(62,39,35,0.25)}
  .lg{box-shadow:0 20px 40px -18px rgba(62,39,35,0.35)}
  .xl{box-shadow:0 30px 60px -20px rgba(62,39,35,0.40)}
  .label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.5px;text-align:center}
</style></head>
<body>
  <div class="item"><div class="card xs"></div><div class="label">xs</div></div>
  <div class="item"><div class="card sm"></div><div class="label">sm</div></div>
  <div class="item"><div class="card md"></div><div class="label">md</div></div>
  <div class="item"><div class="card lg"></div><div class="label">lg · firma</div></div>
  <div class="item"><div class="card xl"></div><div class="label">xl</div></div>
</body></html>
