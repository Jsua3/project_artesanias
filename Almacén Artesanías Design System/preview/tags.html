<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--cream);box-sizing:border-box;min-height:100vh;position:relative;overflow:hidden;font-family:var(--font-body)}
  /* fondo cafetero para que el glass se note */
  .bg{position:absolute;inset:0;z-index:0}
  .bg svg{width:100%;height:100%;display:block}
  .content{position:relative;z-index:1;padding:22px 26px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .label{font-size:10px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--warm-white);opacity:.85;width:100%;margin-bottom:-4px;text-shadow:0 1px 2px rgba(58,50,40,.25)}

  /* GLASS TAG — municipio / ubicación */
  .tag{
    font-size:12px;font-weight:500;letter-spacing:.05em;
    padding:7px 14px;border-radius:999px;
    background:rgba(248,245,238,0.35);
    backdrop-filter:blur(14px) saturate(150%);
    -webkit-backdrop-filter:blur(14px) saturate(150%);
    border:1px solid rgba(184,154,94,0.45);
    color:var(--coffee);
    box-shadow:
      0 4px 16px -6px rgba(58,50,40,.28),
      inset 0 1px 0 rgba(255,252,245,0.5);
    cursor:pointer;
    transition:all .3s cubic-bezier(0.25,0.46,0.45,0.94)
  }
  .tag:hover{background:rgba(110,97,82,0.55);color:var(--warm-white);border-color:rgba(184,154,94,0.75);transform:translateY(-1px)}
  .tag.is-active{background:rgba(58,50,40,0.62);color:var(--warm-white);border-color:rgba(184,154,94,0.7)}

  /* GLASS CHIP — categoría de oficio (con matiz semántico) */
  .chip{
    font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;
    padding:6px 13px;border-radius:4px;
    backdrop-filter:blur(14px) saturate(150%);
    -webkit-backdrop-filter:blur(14px) saturate(150%);
    border:1px solid;
    box-shadow:0 4px 14px -6px rgba(58,50,40,.22),inset 0 1px 0 rgba(255,252,245,0.4);
    display:inline-flex;align-items:center;gap:6px
  }
  .chip .dot{width:6px;height:6px;border-radius:50%}
  .chip.clay  {background:rgba(110,97,82,.28); color:#2E271F;  border-color:rgba(110,97,82,.45)}
  .chip.clay  .dot{background:#6E6152}
  .chip.sage  {background:rgba(78,90,66,.28);  color:#2E3624;  border-color:rgba(78,90,66,.45)}
  .chip.sage  .dot{background:#4E5A42}
  .chip.mauve {background:rgba(142,116,130,.32);color:#3D2F38; border-color:rgba(142,116,130,.5)}
  .chip.mauve .dot{background:#6E586A}
  .chip.ember {background:rgba(176,112,80,.28); color:#3E2518; border-color:rgba(176,112,80,.5)}
  .chip.ember .dot{background:#B07050}
</style></head>
<body>
  <div class="bg" aria-hidden="true">
    <svg viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#E4DDD1"/><stop offset="1" stop-color="#EFEAE1"/>
        </linearGradient>
        <radialGradient id="sun" cx="0.82" cy="0.2" r="0.4">
          <stop offset="0" stop-color="#B89A5E" stop-opacity="0.45"/><stop offset="1" stop-color="#B89A5E" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="mv" cx="0.15" cy="0.8" r="0.45">
          <stop offset="0" stop-color="#8E7482" stop-opacity="0.4"/><stop offset="1" stop-color="#8E7482" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="1200" height="400" fill="url(#sky)"/>
      <rect width="1200" height="400" fill="url(#sun)"/>
      <rect width="1200" height="400" fill="url(#mv)"/>
      <path d="M0 230 L150 200 L320 230 L470 180 L620 220 L780 175 L940 215 L1200 190 L1200 400 L0 400 Z" fill="#8E7482" opacity=".3"/>
      <path d="M0 280 L180 250 L360 275 L520 230 L680 265 L840 230 L1000 260 L1200 240 L1200 400 L0 400 Z" fill="#7A8968" opacity=".42"/>
      <path d="M0 320 L200 300 L400 315 L600 285 L800 305 L1000 290 L1200 305 L1200 400 L0 400 Z" fill="#6E6152" opacity=".62"/>
      <rect y="260" width="1200" height="50" fill="#EFEAE1" opacity=".28"/>
      <g fill="#B89A5E" opacity=".55">
        <circle cx="200" cy="130" r="1.5"/><circle cx="380" cy="100" r="1.2"/>
        <circle cx="560" cy="140" r="1.4"/><circle cx="760" cy="110" r="1.3"/>
        <circle cx="920" cy="135" r="1.1"/><circle cx="1060" cy="90" r="1"/>
      </g>
    </svg>
  </div>
  <div class="content">
    <div class="label">Municipios — glass tags</div>
    <div class="row">
      <span class="tag is-active">Filandia</span>
      <span class="tag">Salento</span>
      <span class="tag">Pijao</span>
      <span class="tag">Circasia</span>
      <span class="tag">Armenia</span>
    </div>
    <div class="label">Oficios — glass chips</div>
    <div class="row">
      <span class="chip clay"><span class="dot"></span>Alfarería</span>
      <span class="chip sage"><span class="dot"></span>Tejido</span>
      <span class="chip mauve"><span class="dot"></span>Textil</span>
      <span class="chip ember"><span class="dot"></span>Madera</span>
    </div>
  </div>
</body></html>
