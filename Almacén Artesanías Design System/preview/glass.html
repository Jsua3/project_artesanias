<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--cream);box-sizing:border-box;height:100vh;overflow:hidden;position:relative;font-family:var(--font-body)}
  .bg{position:absolute;inset:0;overflow:hidden}
  /* niebla cafetera: cordillera escalonada + luz del amanecer */
  .bg svg{width:100%;height:100%;display:block}
  .glass{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:78%;max-width:560px;padding:22px 26px;
    background:rgba(239,234,225,0.52);
    backdrop-filter:blur(22px) saturate(155%);
    -webkit-backdrop-filter:blur(22px) saturate(155%);
    border:1px solid rgba(184,154,94,0.55);
    border-radius:16px;
    box-shadow:
      0 8px 32px 0 rgba(58,50,40,0.28),
      inset 0 1px 0 rgba(255,252,245,0.55),
      inset 0 -1px 0 rgba(58,50,40,0.06);
    display:flex;flex-direction:column;gap:6px
  }
  /* sutil gradiente interno que remata la sensación de "cristal" */
  .glass::before{
    content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(135deg,rgba(255,252,245,0.35) 0%,rgba(255,252,245,0) 40%,rgba(110,97,82,0.08) 100%);
  }
  .eb{font-size:10px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:var(--terra-green-deep);position:relative}
  .t{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--coffee);font-weight:500;position:relative}
  .f{font-size:12px;color:var(--coffee-soft);line-height:1.55;position:relative}
  .rule{width:34px;height:1px;background:var(--gold);margin:6px 0;position:relative}
</style></head>
<body>
  <div class="bg" aria-hidden="true">
    <svg viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#E4DDD1"/>
          <stop offset="0.55" stop-color="#EFEAE1"/>
          <stop offset="1" stop-color="#EFEAE1"/>
        </linearGradient>
        <radialGradient id="sun" cx="0.78" cy="0.28" r="0.38">
          <stop offset="0" stop-color="#B89A5E" stop-opacity="0.42"/>
          <stop offset="1" stop-color="#B89A5E" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="mauveGlow" cx="0.22" cy="0.78" r="0.42">
          <stop offset="0" stop-color="#8E7482" stop-opacity="0.35"/>
          <stop offset="1" stop-color="#8E7482" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="1200" height="600" fill="url(#sky)"/>
      <rect width="1200" height="600" fill="url(#sun)"/>
      <rect width="1200" height="600" fill="url(#mauveGlow)"/>
      <!-- cordillera escalonada -->
      <path d="M0 360 L120 310 L260 350 L400 290 L540 335 L680 280 L820 325 L960 295 L1100 320 L1200 300 L1200 600 L0 600 Z" fill="#8E7482" opacity="0.28"/>
      <path d="M0 420 L150 380 L320 410 L470 360 L620 400 L780 355 L940 395 L1080 370 L1200 395 L1200 600 L0 600 Z" fill="#7A8968" opacity="0.38"/>
      <path d="M0 470 L180 440 L360 465 L520 420 L680 455 L840 420 L1000 450 L1200 430 L1200 600 L0 600 Z" fill="#6E6152" opacity="0.55"/>
      <path d="M0 520 L200 500 L400 510 L600 480 L800 500 L1000 485 L1200 500 L1200 600 L0 600 Z" fill="#3A3228" opacity="0.55"/>
      <!-- capas de niebla -->
      <rect y="380" width="1200" height="80" fill="#EFEAE1" opacity="0.32"/>
      <rect y="430" width="1200" height="60" fill="#EFEAE1" opacity="0.25"/>
      <!-- partículas doradas -->
      <g fill="#B89A5E" opacity="0.55">
        <circle cx="180" cy="210" r="1.8"/><circle cx="340" cy="160" r="1.2"/>
        <circle cx="520" cy="240" r="1.6"/><circle cx="740" cy="180" r="1.3"/>
        <circle cx="880" cy="220" r="1.7"/><circle cx="1040" cy="170" r="1.2"/>
        <circle cx="260" cy="120" r="1"/><circle cx="620" cy="140" r="1.1"/>
        <circle cx="940" cy="110" r="1"/><circle cx="420" cy="90" r="0.9"/>
      </g>
    </svg>
  </div>
  <div class="glass">
    <div class="eb">Glass · blur 22 · sat 155</div>
    <div class="t">Modales sobre neblina cafetera</div>
    <div class="rule"></div>
    <div class="f">Fondo greige 52% · borde gold 55% · sombra teñida con coffee. Sobre imagen de paisaje, el cristal revela la cordillera y la luz del amanecer sin perder legibilidad.</div>
  </div>
</body></html>
