<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 28px;background:var(--cream);box-sizing:border-box}
  .stack{display:flex;flex-direction:column;gap:2px}
  .row{display:flex;align-items:baseline;gap:18px;padding:6px 0;border-bottom:1px solid var(--border-soft)}
  .row:last-child{border:none}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);min-width:96px;letter-spacing:.5px;text-transform:uppercase}
  .sample{font-family:'Fraunces',serif;color:var(--coffee);line-height:1.05;letter-spacing:-0.01em;font-weight:600}
</style></head>
<body>
<div class="stack">
  <div class="row"><div class="meta">Display · 600</div><div class="sample" style="font-size:56px">Maestros del barro</div></div>
  <div class="row"><div class="meta">Display · 700</div><div class="sample" style="font-size:38px;font-weight:700">Filandia, 2026</div></div>
  <div class="row"><div class="meta">Display · 800 italic</div><div class="sample" style="font-size:28px;font-style:italic;font-weight:800">Quindío</div></div>
</div>
</body></html>
