<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--cream);min-height:100vh;box-sizing:border-box}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;height:100%}
  .swatch{display:flex;flex-direction:column;gap:8px;justify-content:flex-end}
  .chip{aspect-ratio:1.2;border-radius:var(--radius-md);position:relative;overflow:hidden}
  .chip::after{content:'';position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(58,50,40,0.10);border-radius:inherit}
  .chip.gold{background:var(--cream);border:1px solid var(--gold-35)}
  .chip.gold::before{content:'';position:absolute;left:14%;right:14%;top:50%;height:1px;background:#B89A5E}
  .name{font-family:var(--font-serif);font-weight:500;font-size:12px;color:var(--coffee);line-height:1.1}
  .hex{font-family:var(--font-mono);font-size:9px;color:var(--fg-2);letter-spacing:0.5px;text-transform:uppercase}
  .note{font-family:var(--font-body);font-size:9px;color:var(--fg-3);font-style:italic;margin-top:2px;line-height:1.3}
</style></head>
<body>
<div class="grid">
  <div class="swatch"><div class="chip" style="background:#7A8968"></div><div class="name">Verde terra</div><div class="hex">#7A8968</div><div class="note">vegetación</div></div>
  <div class="swatch"><div class="chip" style="background:#4E5A42"></div><div class="name">Verde terra deep</div><div class="hex">#4E5A42</div><div class="note">success</div></div>
  <div class="swatch"><div class="chip" style="background:#8E7482"></div><div class="name">Morado tierra</div><div class="hex">#8E7482</div><div class="note">acento 2º</div></div>
  <div class="swatch"><div class="chip" style="background:#6E586A"></div><div class="name">Morado deep</div><div class="hex">#6E586A</div><div class="note">hover</div></div>
  <div class="swatch"><div class="chip gold"></div><div class="name">Gold apagado</div><div class="hex">#B89A5E</div><div class="note">sólo filamento</div></div>
  <div class="swatch"><div class="chip" style="background:#B07050"></div><div class="name">Ember</div><div class="hex">#B07050</div><div class="note">raro · nunca con morado</div></div>
</div>
</body></html>
