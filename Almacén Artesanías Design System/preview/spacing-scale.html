<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--cream);box-sizing:border-box}
  .row{display:flex;align-items:center;gap:14px;padding:6px 0}
  .bar{height:10px;background:var(--clay);border-radius:2px;opacity:.8}
  .label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--fg-3);min-width:48px;text-transform:uppercase;letter-spacing:.5px}
  .px{font-family:'Outfit',sans-serif;font-size:11px;color:var(--fg-2);margin-left:auto}
</style></head>
<body>
  <div class="row"><div class="label">s-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="label">s-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="label">s-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="label">s-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="label">s-5</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="label">s-6</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="label">s-7</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="label">s-8</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
  <div class="row"><div class="label">s-9</div><div class="bar" style="width:96px"></div><div class="px">96 px</div></div>
  <div class="row"><div class="label">s-10</div><div class="bar" style="width:120px"></div><div class="px">120 px · entre secciones</div></div>
</body></html>
