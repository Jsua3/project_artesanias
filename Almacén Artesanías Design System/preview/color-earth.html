<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--cream);min-height:100vh;box-sizing:border-box}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;height:100%}
  .swatch{display:flex;flex-direction:column;gap:8px;justify-content:flex-end}
  .chip{aspect-ratio:1.3;border-radius:var(--radius-md);position:relative;overflow:hidden}
  .chip::after{content:'';position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(58,50,40,0.08);border-radius:inherit}
  .name{font-family:var(--font-serif);font-weight:500;font-size:13px;color:var(--coffee);line-height:1.1}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);letter-spacing:0.5px;text-transform:uppercase}
  .note{font-family:var(--font-body);font-size:10px;color:var(--fg-3);font-style:italic;margin-top:2px}
</style></head>
<body>
<div class="grid">
  <div class="swatch"><div class="chip" style="background:#A69683"></div><div class="name">Greige</div><div class="hex">#A69683</div><div class="note">tierra dominante</div></div>
  <div class="swatch"><div class="chip" style="background:#6E6152"></div><div class="name">Greige deep</div><div class="hex">#6E6152</div><div class="note">hover, texto</div></div>
  <div class="swatch"><div class="chip" style="background:#C4B7A5"></div><div class="name">Greige light</div><div class="hex">#C4B7A5</div><div class="note">decoración</div></div>
  <div class="swatch"><div class="chip" style="background:#3A3228"></div><div class="name">Coffee</div><div class="hex">#3A3228</div><div class="note">texto AAA</div></div>
  <div class="swatch"><div class="chip" style="background:#544A3E"></div><div class="name">Coffee soft</div><div class="hex">#544A3E</div><div class="note">texto 2</div></div>
</div>
</body></html>
