<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--cream);box-sizing:border-box;display:flex;align-items:center;gap:28px}
  .logo{width:88px;height:88px;color:var(--clay-deep);flex-shrink:0}
  .stack{display:flex;flex-direction:column}
  .mark{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:28px;letter-spacing:.3em;text-transform:uppercase;color:var(--clay-deep);line-height:1}
  .sub{font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--moss);margin-top:6px}
  .rule{width:40px;height:1px;background:var(--gold);margin:10px 0}
</style></head>
<body>
  <div class="logo">
    <svg viewBox="0 0 50 50" fill="none" width="88" height="88">
      <circle cx="25" cy="25" r="22" stroke="currentColor" stroke-width="1.2" opacity="0.35"/>
      <path d="M25 7C25 7 17 15 17 25C17 35 25 43 25 43C25 43 33 35 33 25C33 15 25 7 25 7Z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
      <circle cx="25" cy="25" r="4.5" stroke="currentColor" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="stack">
    <div class="mark">Almacén</div>
    <div class="mark" style="margin-top:4px">Artesanías</div>
    <div class="rule"></div>
    <div class="sub">Eje cafetero · Colombia</div>
  </div>
</body></html>
