<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:22px 28px;background:var(--cream);box-sizing:border-box}
  .row{display:flex;align-items:baseline;gap:18px;padding:7px 0;border-bottom:1px solid var(--border-soft)}
  .row:last-child{border:none}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);min-width:110px;letter-spacing:.5px;text-transform:uppercase}
  .sample{font-family:'Cormorant Garamond',serif;color:var(--coffee);line-height:1.1}
</style></head>
<body>
  <div class="row"><div class="meta">Cormorant · 400</div><div class="sample" style="font-size:32px">Donde la tradición encuentra su camino</div></div>
  <div class="row"><div class="meta">Cormorant · 500</div><div class="sample" style="font-size:24px;font-weight:500">Un puente al oficio</div></div>
  <div class="row"><div class="meta">Cormorant · 400 italic</div><div class="sample" style="font-size:20px;font-style:italic;color:var(--clay-deep)">con identidad territorial</div></div>
  <div class="row"><div class="meta">Cormorant · 600</div><div class="sample" style="font-size:16px;font-weight:600;letter-spacing:.3em;text-transform:uppercase">Almacén Artesanías</div></div>
</body></html>
