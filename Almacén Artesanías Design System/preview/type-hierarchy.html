<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px 24px;background:var(--cream);box-sizing:border-box;display:flex;flex-direction:column;gap:6px}
  .hero{font-family:'Fraunces',serif;font-weight:600;font-size:52px;line-height:1.02;letter-spacing:-0.01em;color:var(--coffee)}
  .hero em{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--clay-deep);font-weight:400}
  .eb{font-family:'Outfit',sans-serif;font-size:10px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:var(--moss);margin-bottom:6px}
  .sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:var(--clay-deep);font-weight:400;margin-top:4px}
  .rule{width:48px;height:1px;background:var(--gold);margin:10px 0}
  .body{font-family:'Outfit',sans-serif;font-size:13px;font-weight:300;color:var(--fg-2);line-height:1.6;max-width:580px}
</style></head>
<body>
<div class="eb">Pieza editorial — composición tipo</div>
<div class="hero">Maestros del oficio, <em>cafeteros del Quindío</em></div>
<div class="rule"></div>
<div class="body">Cada vasija, cada urdido, cada trazo, sale de un taller con nombre. Conoce a los maestros que sostienen la tradición — y llevan a casa algo con historia.</div>
</body></html>
