<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>Almacén Artesanías — Sitio cliente</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="cliente.css">
</head>
<body class="noise-overlay">
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Collection.jsx"></script>
<script type="text/babel" src="Maestros.jsx"></script>
<script type="text/babel" src="Territorio.jsx"></script>
<script type="text/babel" src="PieceModal.jsx"></script>

<script type="text/babel">
const App = () => {
  const [open, setOpen] = React.useState(null);
  const [cart, setCart] = React.useState([]);
  const [toast, setToast] = React.useState(null);
  const addToCart = (p) => {
    setCart(c => [...c, p]);
    setOpen(null);
    setToast(`Agregado: ${p.name}`);
    setTimeout(() => setToast(null), 2800);
  };
  return (
    <>
      <ClienteHeader cartCount={cart.length} />
      <main>
        <ClienteHero/>
        <Collection onOpen={setOpen}/>
        <Maestros/>
        <Territorio/>
      </main>
      <Footer/>
      <PieceModal piece={open} onClose={() => setOpen(null)} onAdd={addToCart}/>
      {toast && <div className="toast"><span className="toast__dot"></span>{toast}</div>}
    </>
  );
};
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
